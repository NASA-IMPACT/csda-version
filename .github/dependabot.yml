version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 15
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 15
    groups:
      github-actions:
        patterns:
          - "*"
